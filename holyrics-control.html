<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holyrics Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0d0d12;
    --surface:   #16161f;
    --surface2:  #1e1e2e;
    --border:    #2a2a3d;
    --accent:    #7c6af7;
    --accent2:   #a89cf7;
    --success:   #4ade80;
    --danger:    #f87171;
    --warn:      #fbbf24;
    --text:      #e2e2f0;
    --muted:     #6b6b8a;
    --font:      'Inter', sans-serif;
    --mono:      'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--accent2);
  }
  .logo span { color: var(--muted); font-weight: 300; }

  .conn-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .conn-bar input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    width: 160px;
    outline: none;
    transition: border-color .2s;
  }
  .conn-bar input:focus { border-color: var(--accent); }

  .conn-bar input.token-input { width: 200px; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .85; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover:not(:disabled) { opacity: .85; }
  .btn-success { background: #166534; color: var(--success); border: 1px solid #166534; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
    flex-shrink: 0;
  }
  .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--danger); }

  /* ── LAYOUT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 1px;
    background: var(--border);
  }

  .panel {
    background: var(--bg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── NOW PLAYING ── */
  .now-playing {
    grid-column: 1 / -1;
    background: var(--surface);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--danger);
    flex-shrink: 0;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--danger);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  .now-info {
    flex: 1;
    min-width: 0;
  }
  .now-title {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .now-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .slide-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .slide-btn {
    width: 38px; height: 38px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .slide-btn:hover { background: var(--accent); border-color: var(--accent); }
  .slide-btn:active { transform: scale(.93); }

  .slide-counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    min-width: 40px;
    text-align: center;
  }

  /* ── SEARCH ── */
  .search-box {
    display: flex;
    gap: 8px;
  }
  .search-box input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 9px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }

  .results-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
    max-height: 420px;
  }
  .results-list::-webkit-scrollbar { width: 4px; }
  .results-list::-webkit-scrollbar-track { background: transparent; }
  .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .song-item {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: background .15s, border-color .15s;
  }
  .song-item:hover { background: var(--surface2); border-color: var(--border); }
  .song-item.active { background: #1e1a3a; border-color: var(--accent); }

  .song-name {
    font-size: 14px;
    font-weight: 500;
  }
  .song-author {
    font-size: 11px;
    color: var(--muted);
  }

  .empty-state {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 32px 0;
  }

  /* ── BIBLE ── */
  .bible-form {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: end;
  }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-label {
    font-size: 11px;
    color: var(--muted);
  }
  .field-group input, .field-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    outline: none;
    transition: border-color .2s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
  .field-group select option { background: var(--surface2); }

  .bible-row2 {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: end;
  }

  .verse-preview {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    overflow-y: auto;
    max-height: 200px;
    min-height: 80px;
  }
  .verse-preview::-webkit-scrollbar { width: 4px; }
  .verse-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .verse-ref {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 500;
    margin-bottom: 6px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { background: #14532d; color: var(--success); border: 1px solid #166534; }
  #toast.err { background: #450a0a; color: var(--danger); border: 1px solid #7f1d1d; }
</style>
</head>
<body>

<header>
  <div class="logo">Holyrics <span>Control</span></div>
  <div class="conn-bar">
    <div class="status-dot" id="statusDot"></div>
    <input type="text" id="inputIP" placeholder="192.168.1.X" value="192.168.1.60">
    <input type="text" id="inputPort" placeholder="Puerto" value="8091" style="width:70px">
    <input type="text" id="inputToken" class="token-input" placeholder="Token API">
    <button class="btn btn-primary" onclick="conectar()">Conectar</button>
  </div>
</header>

<!-- NOW PLAYING -->
<div class="now-playing">
  <div class="live-badge">
    <div class="live-dot"></div>
    En vivo
  </div>
  <div class="now-info">
    <div class="now-title" id="nowTitle">—</div>
    <div class="now-sub" id="nowSub">Conectá para ver qué está en pantalla</div>
  </div>
  <div class="slide-controls">
    <button class="slide-btn" onclick="prevSlide()" title="Anterior">&#8592;</button>
    <span class="slide-counter" id="slideCounter">—</span>
    <button class="slide-btn" onclick="nextSlide()" title="Siguiente">&#8594;</button>
  </div>
</div>

<main>
  <!-- BUSCAR CANCIONES -->
  <div class="panel">
    <div class="panel-title">Canciones</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar canción..." onkeydown="if(event.key==='Enter') buscarCanciones()">
      <button class="btn btn-primary" onclick="buscarCanciones()">Buscar</button>
    </div>
    <div class="results-list" id="resultsList">
      <div class="empty-state">Buscá una canción para mostrar</div>
    </div>
  </div>

  <!-- BIBLIA -->
  <div class="panel">
    <div class="panel-title">Biblia</div>

    <div class="field-group">
      <div class="field-label">Versión</div>
      <select id="bibleVersion">
        <option value="NVI">NVI</option>
        <option value="RVR60">RVR60</option>
        <option value="RVR95">RVR95</option>
        <option value="DHH">DHH</option>
        <option value="NTV">NTV</option>
        <option value="LBLA">LBLA</option>
      </select>
    </div>

    <div class="bible-form">
      <div class="field-group">
        <div class="field-label">Libro</div>
        <input type="text" id="bibleBook" placeholder="Juan" value="Juan">
      </div>
      <div class="field-group">
        <div class="field-label">Cap.</div>
        <input type="number" id="bibleChapter" value="3" min="1" style="width:60px">
      </div>
      <div class="field-group">
        <div class="field-label">Vers.</div>
        <input type="number" id="bibleVerse" value="16" min="1" style="width:60px">
      </div>
    </div>

    <div style="display:flex; gap:8px;">
      <button class="btn btn-ghost" onclick="buscarVersiculo()" style="flex:1">Buscar versículo</button>
      <button class="btn btn-primary" onclick="mostrarVersiculo()" style="flex:1">Mostrar en pantalla</button>
    </div>

    <div class="verse-preview" id="versePreview">
      <div style="color:var(--muted); font-size:13px;">El versículo aparecerá aquí</div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  let apiBase = '';
  let token = '';
  let pollInterval = null;
  let currentSongId = null;

  // ── CONEXIÓN ──
  function conectar() {
    const ip = document.getElementById('inputIP').value.trim();
    const port = document.getElementById('inputPort').value.trim();
    token = document.getElementById('inputToken').value.trim();
    if (!ip || !port || !token) {
      toast('Completá IP, puerto y token', 'err');
      return;
    }
    apiBase = `http://${ip}:${port}`;
    probarConexion();
  }

  async function probarConexion() {
    try {
      const r = await hlyRequest('GetCurrentPresentation', {});
      if (r && (r.status === 'ok' || r.data !== undefined)) {
        setStatus(true);
        toast('Conectado a Holyrics', 'ok');
        startPolling();
        actualizarNowPlaying(r.data);
      } else {
        setStatus(false);
        toast('Sin respuesta válida — revisá el token', 'err');
      }
    } catch(e) {
      setStatus(false);
      toast('No se pudo conectar — revisá IP y puerto', 'err');
    }
  }

  function setStatus(ok) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
  }

  // ── API ──
  async function hlyRequest(action, input) {
    const res = await fetch(`${apiBase}/api?token=${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, input })
    });
    return await res.json();
  }

  // ── POLLING NOW PLAYING ──
  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
      try {
        const r = await hlyRequest('GetCurrentPresentation', {});
        if (r && r.data) actualizarNowPlaying(r.data);
      } catch(e) { setStatus(false); }
    }, 2000);
  }

  function actualizarNowPlaying(data) {
    if (!data) {
      document.getElementById('nowTitle').textContent = '—';
      document.getElementById('nowSub').textContent = 'Nada en pantalla';
      document.getElementById('slideCounter').textContent = '—';
      return;
    }
    const title = data.name || data.title || '—';
    const type  = data.type || '';
    const slide = data.current_slide ?? '—';
    const total = data.slide_count ?? '—';

    document.getElementById('nowTitle').textContent = title;
    document.getElementById('nowSub').textContent = type ? `Tipo: ${type}` : '';
    document.getElementById('slideCounter').textContent = `${slide} / ${total}`;
  }

  // ── CONTROLES ──
  async function nextSlide() {
    try {
      await hlyRequest('PresentationSlideAction', { action: 'next' });
    } catch(e) { toast('Error al avanzar', 'err'); }
  }

  async function prevSlide() {
    try {
      await hlyRequest('PresentationSlideAction', { action: 'previous' });
    } catch(e) { toast('Error al retroceder', 'err'); }
  }

  // ── CANCIONES ──
  async function buscarCanciones() {
    const text = document.getElementById('searchInput').value.trim();
    if (!text) return;
    if (!apiBase) { toast('Primero conectate', 'err'); return; }

    const list = document.getElementById('resultsList');
    list.innerHTML = '<div class="empty-state">Buscando...</div>';

    try {
      const r = await hlyRequest('SearchLyrics', { text, lyrics: false });
      const songs = r?.data || [];
      if (songs.length === 0) {
        list.innerHTML = '<div class="empty-state">Sin resultados</div>';
        return;
      }
      list.innerHTML = '';
      songs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'song-item' + (s.id === currentSongId ? ' active' : '');
        div.innerHTML = `
          <div class="song-name">${s.title || s.name || 'Sin título'}</div>
          <div class="song-author">${s.artist || s.author || ''}</div>
        `;
        div.onclick = () => mostrarCancion(s.id, s.title || s.name, div);
        list.appendChild(div);
      });
    } catch(e) {
      list.innerHTML = '<div class="empty-state">Error al buscar</div>';
      toast('Error en búsqueda', 'err');
    }
  }

  async function mostrarCancion(id, name, el) {
    try {
      await hlyRequest('ShowLyrics', { id });
      currentSongId = id;
      document.querySelectorAll('.song-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      toast(`Mostrando: ${name}`, 'ok');
    } catch(e) {
      toast('Error al mostrar canción', 'err');
    }
  }

  // ── BIBLIA ──
  async function buscarVersiculo() {
    if (!apiBase) { toast('Primero conectate', 'err'); return; }
    const book    = document.getElementById('bibleBook').value.trim();
    const chapter = parseInt(document.getElementById('bibleChapter').value);
    const verse   = parseInt(document.getElementById('bibleVerse').value);
    const version = document.getElementById('bibleVersion').value;

    if (!book || !chapter || !verse) { toast('Completá libro, capítulo y versículo', 'err'); return; }

    const preview = document.getElementById('versePreview');
    preview.innerHTML = '<div style="color:var(--muted)">Buscando...</div>';

    try {
      const r = await hlyRequest('GetBibleVerse', {
        book, chapter, verse, version
      });
      const v = r?.data;
      if (!v) {
        preview.innerHTML = '<div style="color:var(--muted)">Versículo no encontrado</div>';
        return;
      }
      const text = v.text || v.content || JSON.stringify(v);
      preview.innerHTML = `
        <div class="verse-ref">${book} ${chapter}:${verse} (${version})</div>
        <div>${text}</div>
      `;
    } catch(e) {
      preview.innerHTML = '<div style="color:var(--muted)">Error al buscar el versículo</div>';
      toast('Error al buscar versículo', 'err');
    }
  }

  async function mostrarVersiculo() {
    if (!apiBase) { toast('Primero conectate', 'err'); return; }
    const book    = document.getElementById('bibleBook').value.trim();
    const chapter = parseInt(document.getElementById('bibleChapter').value);
    const verse   = parseInt(document.getElementById('bibleVerse').value);
    const version = document.getElementById('bibleVersion').value;

    if (!book || !chapter || !verse) { toast('Completá libro, capítulo y versículo', 'err'); return; }

    try {
      await hlyRequest('ShowBibleVerse', { book, chapter, verse, version });
      toast(`Mostrando ${book} ${chapter}:${verse}`, 'ok');
    } catch(e) {
      toast('Error al mostrar versículo', 'err');
    }
  }

  // ── TOAST ──
  let toastTimeout;
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── ATAJOS DE TECLADO ──
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === 'ArrowLeft')  prevSlide();
  });
</script>
</body>
</html>
